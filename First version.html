    <div class="container">

        </div>

            <button id="ask-gemini-button">提问</button>

                events: [
                    "在天津小站负责编练中国第一支采用西法训练的新建陆军，治军严明，部队战斗力较强。",
                    "变法期间，立场摇摆，与维新派和后党均有接触。",
                    "1898年9月18日，谭嗣同夜访请求其发兵支持维新派，“围园劫后”。",
                    "9月20日，向直隶总督荣禄告密，将维新派的计划和盘托出，直接导致政变提前爆发。",
                    "戊戌政变后，因“告密有功”获得慈禧太后信任，仕途进一步上升，成为晚清重臣。"
                ],
                detailed_relationships: {
                    "谭嗣同": "表面应承谭嗣同的请求，实际为了政治投机而出卖维新派。",
                    "荣禄": "向其告密，提供镇压维新派的口实和时机。",
                    "慈禧太后": "通过告密获得慈禧的赏识，成为其后倚重的人物之一。"
                }
            }
        ];
        // D3.js and other JS code (same as previous version for graph rendering and modal logic)
        // ... (rest of the D3.js and graph interaction code from the previous version)

        const relationships = [
            { source: "光绪帝", target: "慈禧太后", type: "权力受控/对立" }, { source: "光绪帝", target: "康有为", type: "倚重/领导" }, { source: "光绪帝", target: "梁启超", type: "倚重" }, { source: "光绪帝", target: "谭嗣同", type: "倚重" }, { source: "光绪帝", target: "翁同龢", type: "师生/被罢黜" },
            { source: "康有为", target: "梁启超", type: "师生/领袖" }, { source: "康有为", target: "谭嗣同", type: "师生/领袖" }, { source: "康有为", target: "康广仁", type: "兄弟" },
            { source: "谭嗣同", target: "袁世凯", type: "试图争取/被出卖" },
            { source: "谭嗣同", target: "康广仁", type: "同为六君子"}, { source: "谭嗣同", target: "林旭", type: "同为六君子"}, { source: "谭嗣同", target: "杨深秀", type: "同为六君子"}, { source: "谭嗣同", target: "杨锐", type: "同为六君子"}, { source: "谭嗣同", target: "刘光第", type: "同为六君子"},
            { source: "康广仁", target: "林旭", type: "同为六君子"}, { source: "杨深秀", target: "杨锐", type: "同为六君子"}, { source: "林旭", target: "刘光第", type: "同为六君子"},
            { source: "慈禧太后", target: "荣禄", type: "倚重/亲信" }, { source: "慈禧太后", target: "刚毅", type: "倚重/亲信" }, { source: "慈禧太后", target: "徐桐", type: "同派系" }, { source: "慈禧太后", target: "崇礼", type: "任用" }, { source: "慈禧太后", target: "怀塔布", type: "任用" }, { source: "慈禧太后", target: "翁同龢", type: "罢黜" },
            { source: "荣禄", target: "袁世凯", type: "袁告密于荣" },
        ];

        const factionColors = { 1: "#60a5fa", 2: "#f87171", 3: "#fbbf24" };

        const svg = d3.select("#relationship-graph");
        const width = parseInt(svg.style("width"));
        const height = Math.max(500, window.innerHeight * 0.65);
        svg.attr("height", height);

        const tooltip = d3.select(".tooltip");
        const modal = d3.select("#character-modal");
        const modalCharacterName = d3.select("#modal-character-name");
        const modalEventsList = d3.select("#modal-events-list");
        const modalRelationshipsList = d3.select("#modal-relationships-list");

        let simulation = d3.forceSimulation(characters)
            .force("link", d3.forceLink(relationships).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-500))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(25));

        const link = svg.append("g").attr("class", "links").selectAll("line").data(relationships).join("line").attr("class", "link").style("stroke", "#9ca3af");

        const node = svg.append("g").attr("class", "nodes").selectAll("g").data(characters).join("g").attr("class", "node").call(drag(simulation));

        node.append("circle")
            .attr("r", 12)
            .attr("fill", d => factionColors[d.group])
            .on("mouseover", function(event, d) {
                if (modal.classed("active")) return;
                tooltip.transition().duration(200).style("opacity", .9);
                tooltip.html(`<strong>${d.name}</strong><br>${d.details}<br>阵营: ${getFactionName(d.group)}`)
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 28) + "px");
                
                d3.select(this).attr("r", 15).style("stroke", "#333").style("stroke-width", "2px");
                link.style('stroke', l => (l.source.id === d.id || l.target.id === d.id) ? (factionColors[d.group] || '#333') : '#9ca3af')
                    .style('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.3)
                    .style('stroke-width', l => (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1.5);
                node.selectAll("circle").filter(n => n !== d).style('opacity', n => isConnected(d, n) ? 1 : 0.3);
                node.selectAll("text").filter(n => n !== d).style('opacity', n => isConnected(d, n) ? 1 : 0.3);
            })
            .on("mouseout", function(event, d) {
                if (modal.classed("active")) return;
                tooltip.transition().duration(500).style("opacity", 0);
                d3.select(this).attr("r", 12).style("stroke", "#fff").style("stroke-width", "1.5px");
                link.style('stroke', '#9ca3af').style('stroke-opacity', 0.6).style('stroke-width', 1.5);
                node.selectAll("circle").style('opacity', 1);
                node.selectAll("text").style('opacity', 1);
            })
            .on("click", function(event, d) {
                event.stopPropagation();
                tooltip.style("opacity", 0);
                displayCharacterInfo(d);
            });

        node.append("text").text(d => d.name).attr("x", 0).attr("y", 22);

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        function displayCharacterInfo(characterData) {
            modalCharacterName.text(characterData.name);
            modalEventsList.html("");
            if (characterData.events && characterData.events.length > 0) {
                characterData.events.forEach(eventText => {
                    modalEventsList.append("li").text(eventText);
                });
            } else {
                modalEventsList.append("li").text("暂无详细事件信息。");
            }
            modalRelationshipsList.html("");
            if (characterData.detailed_relationships && Object.keys(characterData.detailed_relationships).length > 0) {
                Object.entries(characterData.detailed_relationships).forEach(([personId, description]) => {
                    const relatedPersonObject = characters.find(c => c.id === personId || c.name === personId);
                    const personName = relatedPersonObject ? relatedPersonObject.name : personId;
                    modalRelationshipsList.append("p").html(`<strong>与 ${personName}:</strong> ${description}`);
                });
            } else {
                modalRelationshipsList.append("p").text("暂无详细人物关系信息。");
            }
            modal.classed("active", true);
        }

        d3.select("#modal-close").on("click", function() { modal.classed("active", false); });
        modal.on("click", function(event) { if (event.target === this) { modal.classed("active", false); } });

        function getFactionName(group) {
            if (group === 1) return "帝党 / 维新派";
            if (group === 2) return "后党 / 保守派";
            if (group === 3) return "关键军事人物 / 中立或摇摆";
            return "未知";
        }
        
        let linkedByIndex = {};
        relationships.forEach(d => {
            const sourceId = typeof d.source === 'object' ? d.source.id : d.source;
            const targetId = typeof d.target === 'object' ? d.target.id : d.target;
            linkedByIndex[`${sourceId},${targetId}`] = 1;
        });

        function isConnected(a, b) { return linkedByIndex[`${a.id},${b.id}`] || linkedByIndex[`${b.id},${a.id}`] || a.id === b.id; }

        function drag(simulation) {
            function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
            function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
            function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }

        d3.select("#charge-slider").on("input", function() { simulation.force("charge").strength(+this.value); simulation.alpha(0.3).restart(); });
        d3.select("#link-distance-slider").on("input", function() { simulation.force("link").distance(+this.value); simulation.alpha(0.3).restart(); });
        d3.select("#reset-button").on("click", function() {
            d3.select("#charge-slider").property("value", -500);
            d3.select("#link-distance-slider").property("value", 80);
            simulation.force("charge").strength(-500);
            simulation.force("link").distance(80);
            characters.forEach(node => { node.fx = null; node.fy = null; });
            simulation.alpha(1).restart();
        });

        window.addEventListener('resize', () => {
            const newWidth = parseInt(d3.select("#relationship-graph").style("width"));
            const newHeight = Math.max(500, window.innerHeight * 0.65);
            svg.attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });

        // Gemini API Integration
        const askGeminiButton = document.getElementById('ask-gemini-button');
        const geminiPromptTextarea = document.getElementById('gemini-prompt');
        const geminiResponseArea = document.getElementById('gemini-response-area');

        askGeminiButton.addEventListener('click', async () => {
            const prompt = geminiPromptTextarea.value.trim();
            if (!prompt) {
                geminiResponseArea.textContent = '请输入您的问题。';
                return;
            }

            geminiResponseArea.textContent = '正在思考中...';
            let chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
            const payload = { contents: chatHistory };
            // Using the API key provided by the user.
            const apiKey = "AIzaSyAr7LD7BWmgWfC3TaG0IdP5_BeHsMZJpbM"; // User-provided API key
            // Updated API URL to use gemini-2.5-pro as requested by the user.
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${apiKey}`;


            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('Gemini API Error:', errorData);
                    geminiResponseArea.textContent = `抱歉，调用API时出错: ${errorData.error?.message || response.statusText}`;
                    return;
                }

                const result = await response.json();

                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const text = result.candidates[0].content.parts[0].text;
                    geminiResponseArea.textContent = text;
                } else {
                    console.error('Unexpected API response structure:', result);
                    geminiResponseArea.textContent = '抱歉，未能从API获取有效回答。';
                    if (result.promptFeedback && result.promptFeedback.blockReason) {
                         geminiResponseArea.textContent += `\n原因: ${result.promptFeedback.blockReason}`;
                         if (result.promptFeedback.safetyRatings) {
                            result.promptFeedback.safetyRatings.forEach(rating => {
                                if (rating.blocked) {
                                     geminiResponseArea.textContent += ` (${rating.category} 被阻止)`;
                                }
                            });
                         }
                    }
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                geminiResponseArea.textContent = `抱歉，请求过程中发生网络错误: ${error.message}`;
            }
        });
    </script>
</body>
</html>
